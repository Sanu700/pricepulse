services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    environment:
      DB_NAME: pricepulse
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CACHE_URL: redis://redis:6379/1
      USE_REDIS_CACHE: "True"
      # Fake mode for clean first boot. Switch to hybrid + Playwright for live prices.
      PROVIDER_MODE: fake
      PROVIDER_USE_PLAYWRIGHT: "False"
      RUN_BOOTSTRAP: "1"
      RUN_COLLECT_ON_BOOT: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build: ./frontend1/frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend1/frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_API_DOCS_URL: http://localhost:8000/api/docs/
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0 --port 5173

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17
    container_name: pricepulse-postgres
    restart: always
    environment:
      POSTGRES_DB: pricepulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pricepulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricepulse-celery
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DB_NAME: pricepulse
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"
      PROVIDER_MODE: fake
      PROVIDER_USE_PLAYWRIGHT: "False"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CACHE_URL: redis://redis:6379/1
      USE_REDIS_CACHE: "True"
      RUN_BOOTSTRAP: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DB_NAME: pricepulse
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"
      PROVIDER_MODE: fake
      PROVIDER_USE_PLAYWRIGHT: "False"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CACHE_URL: redis://redis:6379/1
      USE_REDIS_CACHE: "True"
      RUN_BOOTSTRAP: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery:
        condition: service_started

volumes:
  postgres_data:
  media_data:
