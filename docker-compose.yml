services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: pricepulse-backend

    command: python manage.py runserver 0.0.0.0:8000

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      - redis

    environment:
      - PYTHONUNBUFFERED=1

  redis:
    image: redis:7-alpine

    container_name: pricepulse-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: pricepulse-celery

    command: celery -A config worker --loglevel=info

    volumes:
      - ./backend:/app

    depends_on:
      - redis