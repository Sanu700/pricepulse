name: Bug report
description: Report a reproducible bug
labels: [bug]

body:
  - type: textarea
    attributes:
      label: What happened?
      description: Include steps to reproduce.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
  - type: textarea
    attributes:
      label: Logs / screenshots
  - type: input
    attributes:
      label: Environment
      placeholder: OS, browser, Docker, provider mode
